kind = "web"
previewPath = "/"
title = "Club Kudo — Stripe Connect Routing"
version = "1.0.0"
id = "artifacts/club-kudo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24668

[services.development]
run = "pnpm --filter @workspace/club-kudo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/club-kudo", "run", "build" ]
publicDir = "artifacts/club-kudo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24668"
BASE_PATH = "/"

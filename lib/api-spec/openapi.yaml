openapi: 3.1.0
info:
  # Do not change the title — codegen import paths depend on it
  title: Api
  version: 0.1.0
  description: |
    Club Kudo API — Phase 1 surface area.

    Covers authentication (magic-link), supplier CRUD + Stripe Connect
    onboarding, audit log inspection, CSRF token issuance, and health.

    All state-changing endpoints require:
      1. An active session cookie (`ck.sid`)
      2. A CSRF token in the `x-csrf-token` header (matching `ck.csrf` cookie)
      3. The session user to hold the appropriate role (admin / supplier)

    Idempotency: write endpoints accept an `Idempotency-Key` header (UUID).
    Server stores the key in `audit_log.idempotency_key`.

servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health and readiness
  - name: csrf
    description: CSRF token issuance
  - name: auth
    description: Magic-link authentication and session management
  - name: suppliers
    description: Supplier directory and Stripe Connect onboarding
  - name: audit
    description: Append-only audit log inspection

security:
  - sessionCookie: []

paths:
  # ─── Health ───────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CSRF token ───────────────────────────────────────────────────────
  /csrf-token:
    get:
      operationId: getCsrfToken
      tags: [csrf]
      summary: Issue a CSRF token bound to the current session
      description: |
        Must be called before any state-changing request. Sets the
        `ck.sid` and `ck.csrf` cookies and returns the token to echo
        back via the `x-csrf-token` header.
      security: []
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfToken"

  # ─── Auth ─────────────────────────────────────────────────────────────
  /auth/magic-link:
    post:
      operationId: requestMagicLink
      tags: [auth]
      summary: Request a magic-link email
      description: |
        Always returns 200 with a generic message regardless of whether
        the email belongs to a known user — this prevents user enumeration.

        Server-side behaviour (CRITICAL):
          - If a user with this email exists AND has at least one role:
            generate token, store hash, send email via Resend.
          - If the user does not exist OR has been soft-deleted:
            do nothing. Do NOT send a "no account found" email — that
            would defeat the entire anti-enumeration protection.
          - In both cases, log the attempt (with a flag for found/not-found)
            to `audit_log` so admins can spot scraping attempts.

        Rate-limited per IP and per email (separately, lower of the two
        windows wins) to throttle enumeration even further.
      security: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkRequest"
      responses:
        "200":
          description: Request accepted (email may or may not have been sent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/CsrfError" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/verify:
    get:
      operationId: verifyMagicLink
      tags: [auth]
      summary: Verify a magic-link token and start a session
      description: |
        Called when the user clicks the link in their email. On success,
        marks the token as used, creates a session, and returns the user.
        Tokens are single-use and expire in 15 minutes.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string, minLength: 32, maxLength: 256 }
      responses:
        "200":
          description: Session established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedUser"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedUser"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Destroy the current session
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204": { description: Session destroyed }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/CsrfError" }

  # ─── Suppliers ────────────────────────────────────────────────────────
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List suppliers (admin only)
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by Stripe onboarding status
          schema:
            $ref: "#/components/schemas/SupplierOnboardingStatus"
        - name: q
          in: query
          required: false
          description: Free-text search over trading_name and contact_email
          schema: { type: string, maxLength: 100 }
        - name: includeDeleted
          in: query
          required: false
          schema: { type: boolean, default: false }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated supplier list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier (admin only)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierRequest"
      responses:
        "201":
          description: Supplier created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /suppliers/{id}:
    parameters:
      - $ref: "#/components/parameters/SupplierId"
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier by id
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier (admin only)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierRequest"
      responses:
        "200":
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Soft-delete a supplier (admin only)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204": { description: Soft-deleted }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /suppliers/{id}/onboarding-link:
    parameters:
      - $ref: "#/components/parameters/SupplierId"
    post:
      operationId: createSupplierOnboardingLink
      tags: [suppliers]
      summary: Create or refresh a Stripe Connect onboarding link
      description: |
        Creates a Stripe V2 connected account if the supplier doesn't
        already have one (idempotent — checked via `stripe_account_id`),
        then generates a Stripe Account Link for onboarding. The link
        is short-lived (Stripe default: a few minutes).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingLinkRequest"
      responses:
        "201":
          description: Onboarding link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingLink"
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Stripe API error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /suppliers/{id}/onboarding-status:
    parameters:
      - $ref: "#/components/parameters/SupplierId"
    get:
      operationId: getSupplierOnboardingStatus
      tags: [suppliers]
      summary: Live Stripe Connect onboarding status
      description: |
        Fetches live status from Stripe (cached 60s in-memory). Pass
        `fresh=true` to bypass the cache. Updates the cached
        `stripe_onboarding_status` and `stripe_capabilities_json` columns
        on the supplier row when the status changes.
      parameters:
        - name: fresh
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Live onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierOnboardingStatusResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Stripe API error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ─── Audit log ────────────────────────────────────────────────────────
  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit]
      summary: List audit log entries (admin only)
      parameters:
        - name: entityType
          in: query
          required: false
          schema: { type: string, maxLength: 64 }
        - name: entityId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: actorUserId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: action
          in: query
          required: false
          schema: { type: string, maxLength: 64 }
        - name: stripeEventId
          in: query
          required: false
          schema: { type: string, maxLength: 64 }
        - name: from
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: to
          in: query
          required: false
          schema: { type: string, format: date-time }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

# ──────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: ck.sid

  parameters:
    SupplierId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque pagination cursor. Echo back the value from
        `pageInfo.nextCursor` of the previous response to fetch the
        next page. Treat as opaque — do not parse or construct.

        Cursor encoding (server contract): base64url(JSON({
          v: <cursor_version_int>,
          k: <last_row_sort_key>,
          id: <last_row_id>      // tiebreaker
        })). Always sorted by `created_at DESC, id DESC` unless an
        endpoint documents otherwise. The `v` field lets us evolve the
        cursor format; servers MUST reject unknown versions with
        `400 cursor_invalid` so old cursors do not silently misbehave
        across deploys.

        Important: cursors are bound to the EXACT filter set that
        produced them. Changing any filter while paginating is
        undefined behaviour — the client should re-issue the first
        page with the new filters.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        REQUIRED on every state-changing request (POST/PATCH/DELETE).
        Must be a UUID v4. Replays of the same key on the same endpoint
        return the original result without re-executing the side effect.

        Server behaviour:
          - Missing or malformed → `400 idempotency_key_required` /
            `400 idempotency_key_invalid` (see ValidationErrorBody).
          - Replay with same key + same path + same authenticated user →
            return original response (status + body) from the audit_log /
            replay store; do NOT re-execute the side effect.
          - Replay with same key but DIFFERENT path or different
            authenticated user → `409 idempotency_key_collision`.

        The key is persisted in `audit_log.idempotency_key` for forensics.
        Enforced from day 1 so Phase 4 transfer creation does not have
        to retrofit the pattern.

        Note: This is the CLIENT-FACING idempotency key only. Internal
        Stripe API calls use a separate, server-generated composite key
        of the form `<action>-<entity_id>-<uuid>` (e.g.
        `transfer-inv_abc123-d290…`) which is stored in
        `transfers.stripe_idempotency_key`. The two systems are intentionally
        decoupled so client retries and Stripe-side retries are independent.
      schema: { type: string, format: uuid }
    CsrfToken:
      name: x-csrf-token
      in: header
      required: true
      description: Token issued by GET /csrf-token; must match the ck.csrf cookie.
      schema: { type: string }

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ValidationErrorBody" }
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but lacks the required role
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Conflict with current resource state (e.g. duplicate email)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    CsrfError:
      description: Missing or invalid CSRF token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    # ── Common ─────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok] }

    CsrfToken:
      type: object
      required: [csrfToken]
      properties:
        csrfToken: { type: string }

    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, description: Machine-readable error code }
        message: { type: string, description: Human-readable summary }
        requestId: { type: string }

    ValidationErrorBody:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          properties:
            issues:
              type: array
              items:
                type: object
                required: [path, message]
                properties:
                  path:
                    type: array
                    items: { type: string }
                  message: { type: string }

    PageInfo:
      type: object
      required: [hasMore]
      properties:
        nextCursor:
          type: string
          nullable: true
        hasMore: { type: boolean }

    # ── Auth ───────────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [admin, supplier]

    MagicLinkRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 320 }

    AuthenticatedUser:
      type: object
      required: [id, email, roles]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName:
          type: string
          nullable: true
        roles:
          type: array
          items: { $ref: "#/components/schemas/UserRole" }

    # ── Suppliers ──────────────────────────────────────────────────────
    SupplierOnboardingStatus:
      type: string
      enum: [pending, onboarding, active, suspended, deauthorized]

    Supplier:
      type: object
      required:
        - id
        - userId
        - tradingName
        - stripeOnboardingStatus
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        tradingName: { type: string, maxLength: 200 }
        contactEmail:
          type: string
          format: email
          nullable: true
        instrument:
          type: array
          nullable: true
          items: { type: string }
        bio:
          type: string
          nullable: true
        stripeAccountId:
          type: string
          nullable: true
        stripeOnboardingStatus:
          $ref: "#/components/schemas/SupplierOnboardingStatus"
        stripeCapabilitiesJson:
          nullable: true
          description: Snapshot of Stripe `capabilities` object from last live fetch
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt:
          type: string
          format: date-time
          nullable: true

    SupplierListResponse:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Supplier" }
        pageInfo: { $ref: "#/components/schemas/PageInfo" }

    CreateSupplierRequest:
      type: object
      required: [email, tradingName]
      properties:
        email:
          type: string
          format: email
          maxLength: 320
          description: |
            Login email for the supplier. Server behaviour (CRITICAL —
            both paths must be supported and tested):

              - Email matches NO existing user → create a new `users` row,
                INSERT the `supplier` role into `user_roles`, then create
                the `suppliers` row linked to that user.
              - Email matches an EXISTING user (e.g. an admin like Gareth
                or Jake who is also performing as a supplier) → reuse
                the existing user. INSERT the `supplier` role into
                `user_roles` if not already present (the composite PK on
                `(user_id, role)` makes this a no-op if the role exists).
                Then create the `suppliers` row linked to that user.
              - Email matches a user that already has a non-soft-deleted
                supplier row → return 409 conflict.

            All three branches must run inside a single DB transaction
            and emit one `audit_log` entry recording the action and
            which path was taken (in `metadata.creation_path`).
        tradingName: { type: string, minLength: 1, maxLength: 200 }
        contactEmail:
          type: string
          format: email
          nullable: true
          description: Optional separate billing/comms email
        instrument:
          type: array
          nullable: true
          items: { type: string, maxLength: 60 }
        bio:
          type: string
          nullable: true
          maxLength: 2000

    UpdateSupplierRequest:
      type: object
      properties:
        tradingName: { type: string, minLength: 1, maxLength: 200 }
        contactEmail:
          type: string
          format: email
          nullable: true
        instrument:
          type: array
          nullable: true
          items: { type: string, maxLength: 60 }
        bio:
          type: string
          nullable: true
          maxLength: 2000

    OnboardingLinkRequest:
      type: object
      required: [refreshUrl, returnUrl]
      properties:
        refreshUrl:
          type: string
          format: uri
          description: Where Stripe sends the user if the link expires
        returnUrl:
          type: string
          format: uri
          description: Where Stripe sends the user after onboarding completes

    OnboardingLink:
      type: object
      required: [url, expiresAt, stripeAccountId]
      properties:
        url: { type: string, format: uri }
        expiresAt: { type: string, format: date-time }
        stripeAccountId: { type: string }

    SupplierOnboardingStatusResponse:
      type: object
      description: |
        Stripe V2 capabilities mapped to convenience booleans.

        Stripe V2 does NOT expose top-level `charges_enabled` /
        `payouts_enabled` booleans the way V1 did — those values must
        be derived from `account.configuration.recipient.capabilities.*`.
        The mapping below is OUR normalization for admin UI convenience.
        The full V2 capabilities object is also returned in `capabilities`
        for inspection.

        Mapping (V2 capability → boolean):
          - `chargesEnabled`      ← (no direct V2 equivalent — Connect
              accounts in V2 are recipient-only; this stays `false` for
              transfer-only accounts and is reserved for future use if
              we add merchant capabilities)
          - `payoutsEnabled`      ← `configuration.recipient.capabilities
              .stripe_balance.stripe_transfers.status === "active"`
              i.e. the supplier can receive transfers from our platform
              balance into their Stripe balance and have them paid out.
          - `detailsSubmitted`    ← `configuration.recipient.requirements
              .currently_due` is empty (i.e. Stripe has no outstanding
              asks blocking onboarding). `eventually_due` items do NOT
              block — they are future requirements (e.g. when the supplier
              crosses a transaction-volume threshold) and are surfaced
              separately to admins via the raw `capabilities` blob.
              This formula is the canonical definition for both this
              field and any server-side gating logic.
      required:
        - supplierId
        - stripeOnboardingStatus
        - chargesEnabled
        - payoutsEnabled
        - detailsSubmitted
        - requirementsCurrentlyDue
        - requirementsPastDue
        - fetchedAt
        - cached
      properties:
        supplierId: { type: string, format: uuid }
        stripeAccountId:
          type: string
          nullable: true
        stripeOnboardingStatus:
          $ref: "#/components/schemas/SupplierOnboardingStatus"
        chargesEnabled:
          type: boolean
          description: Reserved — currently always false for V2 recipient-only accounts
        payoutsEnabled:
          type: boolean
          description: Derived from V2 stripe_transfers capability status === "active"
        detailsSubmitted:
          type: boolean
          description: True when V2 requirements.currently_due is empty
        requirementsCurrentlyDue:
          type: array
          description: V2 configuration.recipient.requirements.currently_due
          items: { type: string }
        requirementsPastDue:
          type: array
          description: V2 configuration.recipient.requirements.past_due
          items: { type: string }
        capabilities:
          description: |
            Live snapshot of `account.configuration.recipient.capabilities`
            from V2 — used for inspection/forensics; clients should prefer
            the normalized booleans above for routine display.
          nullable: true
        fetchedAt:
          type: string
          format: date-time
          description: When the live data was fetched (cache age = now - fetchedAt)
        cached:
          type: boolean
          description: True if returned from in-memory cache (≤60s old)

    # ── Audit log ──────────────────────────────────────────────────────
    AuditLogEntry:
      type: object
      required: [id, timestamp, action, entityType, entityId]
      properties:
        id: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        actorUserId:
          type: string
          format: uuid
          nullable: true
        action: { type: string }
        entityType: { type: string }
        entityId: { type: string, format: uuid }
        beforeState:
          nullable: true
        afterState:
          nullable: true
        stripeEventId:
          type: string
          nullable: true
        idempotencyKey:
          type: string
